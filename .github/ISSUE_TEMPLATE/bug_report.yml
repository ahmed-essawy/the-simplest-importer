name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below so we can reproduce and fix it.

  - type: input
    id: wp-version
    attributes:
      label: WordPress Version
      placeholder: "e.g. 6.9"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP Version
      placeholder: "e.g. 8.2"
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: browser-os
    attributes:
      label: Browser & OS
      placeholder: "e.g. Chrome 124 on Windows 11"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug clearly...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      value: |
        1. Go to Tools → Smartly Import Export
        2. Select '...'
        3. Click '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: csv-sample
    attributes:
      label: CSV Sample (if applicable)
      description: Paste a few rows of your CSV (remove sensitive data).
      render: text

  - type: textarea
    id: error-messages
    attributes:
      label: Error Messages
      description: Any error messages, browser console errors, or PHP errors.
      render: text

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the issue.
